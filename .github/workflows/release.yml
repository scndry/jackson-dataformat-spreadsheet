name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: temurin

      - name: Build and test
        run: ./gradlew check --console=plain

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_SECRET_KEY }}" | base64 -d | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --export-secret-keys > /home/runner/.gnupg/secring.gpg

      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --console=plain
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_signingSecretKeyRingFile: /home/runner/.gnupg/secring.gpg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
